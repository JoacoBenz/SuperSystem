name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Dummy values — nothing connects to a DB during typecheck/test/build.
      # Tests mock Prisma; the pg Pool is lazy so a parseable URL is enough for `next build`.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/erp_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/erp_ci
      NEXTAUTH_SECRET: ci-placeholder-secret-please-override-0000
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm run test -- --coverage
      - run: npm run build
      # Supply-chain gate: fail on high/critical vulns in shipped dependencies.
      - run: npm audit --omit=dev --audit-level=high

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: erp_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/erp_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/erp_ci
      NEXTAUTH_SECRET: ci-placeholder-secret-please-override-0000
      ENCRYPTION_KEY: ci-placeholder-encryption-key-min16
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      # Materialize the schema on the throwaway CI DB (no migration-history baggage).
      - run: npx prisma db push --skip-generate
      - run: npm run test:integration
